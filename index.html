<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Mi Galaxia para el Amor de Mi Vida 🌌</title>
    <!-- Cargamos la biblioteca Three.js para renderización 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Fuentes de Google: Cargamos únicamente la familia Ubuntu para un estilo de letra limpio y moderno -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos generales del documento */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            cursor: default;
            background-color: #030008; 
            font-family: 'Ubuntu', sans-serif; /* Tipografía Ubuntu aplicada a todo el proyecto */
            color: #ffffff;
            height: 100vh;
            width: 100vw;
        }

        /* Lienzo donde se renderiza la escena 3D */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Capa interactiva sutil de fondo para capturar clics y toques */
        .interactive-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: auto;
        }

        /* Contenedor de texto flotante cinematográfico (no bloqueante) */
        #floating-text-container {
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            z-index: 10;
            pointer-events: none; /* Permite clics a través del texto */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Estilo para las frases de amor con brillo suave */
        #story-text {
            font-family: 'Ubuntu', sans-serif;
            font-weight: 400;
            font-size: 2.2rem;
            color: #ffe5ec;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.65), 
                         0 0 20px rgba(255, 77, 109, 0.4),
                         0 2px 4px rgba(0, 0, 0, 0.8);
            line-height: 1.5;
            margin: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            #story-text {
                font-size: 1.6rem;
                line-height: 1.4;
            }
            #floating-text-container {
                bottom: 18%;
            }
        }

        /* Corazones interactivos que flotan al hacer clic */
        .floating-heart {
            position: absolute;
            pointer-events: none;
            color: #ff4d6d;
            font-size: 1.5rem;
            z-index: 99;
            animation: floatUp 2.2s ease-out forwards;
            filter: drop-shadow(0 0 6px rgba(255, 77, 109, 0.7));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-180px) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Botón elegante de control de sonido */
        #music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(18, 10, 36, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 182, 193, 0.3);
            color: white;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2);
            transition: all 0.3s ease;
            outline: none;
        }

        #music-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 77, 109, 0.3);
            box-shadow: 0 4px 20px rgba(255, 77, 109, 0.5);
        }

        /* Pantalla de inicio ultra-minimalista: sólo el botón de entrada */
        #start-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(4, 1, 15, 0.98);
            z-index: 200;
            transition: opacity 0.6s ease-in-out;
        }

        #btn-start {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 999px;
            cursor: pointer;
            font-family: 'Ubuntu', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            outline: none;
        }

        #btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 28px rgba(255, 77, 109, 0.5);
        }

        #btn-start:active {
            transform: translateY(-1px);
        }

        /* ====================================================================
           ESTILOS INTEGRADOS DE LA LLUVIA DE ESTRELLAS FUGACES CSS (NIGHT) 🌌
           ==================================================================== */
        .night {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotateZ(45deg);
            pointer-events: none;
            z-index: 3; /* Sobre el lienzo 3D pero detrás del reproductor y del texto */
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .night.active {
            opacity: 1; /* Se activa durante los 2 minutos de pausa */
        }

        .shooting_star {
            position: absolute;
            left: 50%;
            top: 50%;
            height: 2px;
            background: linear-gradient(-45deg, #5f91ff, rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #699bff);
            animation: tail 3000ms ease-in-out infinite, shooting 3000ms ease-in-out infinite;
        }

        .shooting_star::before {
            content: "";
            position: absolute;
            top: calc(50% - 1px);
            right: 0;
            height: 2px;
            background: linear-gradient(-45deg, rgba(0, 0, 255, 0), #5f91ff, rgba(0, 0, 255, 0));
            transform: translateX(50%) rotateZ(45deg);
            border-radius: 100%;
            animation: shining 3000ms ease-in-out infinite;
        }

        .shooting_star::after {
            content: "";
            position: absolute;
            top: calc(50% - 1px);
            right: 0;
            height: 2px;
            background: linear-gradient(-45deg, rgba(0, 0, 255, 0), #5f91ff, rgba(0, 0, 255, 0));
            transform: translateX(50%) rotateZ(-45deg);
            border-radius: 100%;
            animation: shining 3000ms ease-in-out infinite;
        }

        /* Posicionamientos y retrasos de animación individuales (Tus 20 estrellas) */
        .shooting_star:nth-child(1) {
            top: calc(50% - -149px);
            left: calc(50% - 286px);

        .shooting_star:nth-child(13) {

        .shooting_star:nth-child(14) {

        /* Animaciones clave para el trazado, destello y traslación */
        @keyframes tail {
            0% { width: 0; }
            30% { width: 100px; }
            100% { width: 0; }
        }

        @keyframes shining {
            0% { width: 0; }
            50% { width: 30px; }
            100% { width: 0; }
        }

        @keyframes shooting {
            0% { transform: translateX(0); }
            100% { transform: translateX(300px); }

</head>
<body>

    <!-- Pantalla de bienvenida interactiva simplificada al máximo: Solo botón -->
    <div id="start-screen">
        <button id="btn-start">Abrir con amor 💖</button>
    </div>

    <!-- Capa de 20 estrellas fugaces CSS que se activará en la pausa -->
    <div class="night" id="shooting-stars-sky">
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
    </div>

    <!-- Elemento de audio para reproducir la música de fondo de forma continua -->
    <audio id="bg-music" src="./louana.mp3" preload="auto" loop></audio>

    <!-- Botón flutuante para pausar/reanudar la música -->
    <button id="music-toggle" onclick="toggleMusic()">🔇</button>

    <!-- Capa interactiva para clics y toques -->
    <div class="interactive-overlay" id="space-overlay"></div>

    <!-- Contenedor del texto flutuante -->
    <div id="floating-text-container">
        <p id="story-text"></p>
    </div>

    <script>
        // ====================================================================
        // 1. POEMA FLUTUANTE DE AMOR CON EL NOMBRE CORRECTO 💖
        // ====================================================================
        const PHRASES = [
            "Solo te diré que un día 23 como hoy te conocí, Louana Nicole...",
            "...y desde entonces cada latido de mi corazón menciona tu nombre. ❤️",
            "Sé que no te gusta mucho el texto y más te gustan las acciones...",
            "...así que solo quería decirte que estoy muy orgulloso de todo lo que haces...",
            "...¡vamos, guerrera, estoy contigo! ✨",
            "Escucha la canción y pulsa una y otra vez la luna....."
        ];

        // ====================================================================
        // 2. INICIALIZACIÓN DE LA ESCENA 3D (Three.js)
        // ====================================================================
        const scene = new THREE.Scene();
        
        // Efecto de niebla y color de fondo estelar profundo
        scene.background = new THREE.Color(0x04010f); 
        scene.fog = new THREE.FogExp2(0x04010f, 0.0015);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1500);
        camera.position.z = 180;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Variables de paralaje de movimiento de la cámara
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        // Iluminación general y luces ambientales de tonos románticos
        const ambientLight = new THREE.AmbientLight(0x1e1530); 
        scene.add(ambientLight);

        const pinkLight = new THREE.DirectionalLight(0xff758f, 1.2);
        pinkLight.position.set(-200, 100, 100);
        scene.add(pinkLight);

        const blueLight = new THREE.DirectionalLight(0x4cc9f0, 0.8);
        blueLight.position.set(200, -100, -100);
        scene.add(blueLight);

        let galaxyMesh; 
        let moonMesh; 

        // ====================================================================
        // 3. CREACIÓN DE LOS ELEMENTOS CÓSMICOS (Galaxia y Luna)
        // ====================================================================
        const textureLoader = new THREE.TextureLoader();

        // Generador de sistema de partículas de estrellas de la galaxia
        function createGalaxy() {
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 18000;
            const posArray = new Float32Array(particlesCount * 3);
            const colorArray = new Float32Array(particlesCount * 3);

            const colors = [
                new THREE.Color(0xffffff),
                new THREE.Color(0xffb6c1), // Rosa suave
                new THREE.Color(0xbdecb6), // Verde menta suave
                new THREE.Color(0x90e0ef), // Azul cósmico
                new THREE.Color(0xffc6ff)  // Violeta
            ];

            for (let i = 0; i < particlesCount; i++) {
                posArray[i * 3] = (Math.random() - 0.5) * 800;
                posArray[i * 3 + 1] = (Math.random() - 0.5) * 800;
                posArray[i * 3 + 2] = (Math.random() - 0.5) * 800;

                const chosenColor = colors[Math.floor(Math.random() * colors.length)];
                colorArray[i * 3] = chosenColor.r;
                colorArray[i * 3 + 1] = chosenColor.g;
                colorArray[i * 3 + 2] = chosenColor.b;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            let starTexture;
            try {
                starTexture = textureLoader.load('https://threejs.org/examples/textures/sprites/disc.png'); 
            } catch (e) {
                console.log("Error al cargar la textura de estrella, usando render por defecto.");
            }

            const particlesMaterial = new THREE.PointsMaterial({
                size: 1.2, 
                sizeAttenuation: true, 
                transparent: true,
                opacity: 0.85,
                vertexColors: true,
                map: starTexture || null,      
                alphaTest: 0.1,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            return particlesMesh;
        }

        // Generador de objeto 3D de la Luna
        function createMoon() {
            const moonGeometry = new THREE.SphereGeometry(75, 64, 64); 
            
            let moonMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 0.8,
                metalness: 0.1,
                bumpScale: 0.05
            });

            textureLoader.load(
                'https://threejs.org/examples/textures/planets/moon_1024.jpg',
                (texture) => {
                    moonMaterial.map = texture;
                    moonMaterial.needsUpdate = true;
                },
                undefined,
                () => {
                    // Fallback visual místico en caso de error de conexión
                    moonMaterial.color.setHex(0xe8e8ff);
                    moonMaterial.emissive = new THREE.Color(0x221133);
                }
            );
            
            const mesh = new THREE.Mesh(moonGeometry, moonMaterial);
            mesh.position.set(-60, 20, -250); 
            
            scene.add(mesh);
            return mesh;
        }

        galaxyMesh = createGalaxy();
        moonMesh = createMoon();

        // ====================================================================
        // 4. CICLO DE FRASES CÓSMICAS (Con intervalo de contemplación de 2 minutos)
        // ====================================================================
        const storyText = document.getElementById('story-text');
        const shootingStarsSky = document.getElementById('shooting-stars-sky');
        let currentPhraseIndex = 0;

        function showNextPhrase() {
            storyText.style.opacity = '0';
            
            setTimeout(() => {
                if (currentPhraseIndex === PHRASES.length) {
                    storyText.innerHTML = ""; // Limpiamos la pantalla para la contemplación silenciosa
                    currentPhraseIndex = 0; 
                    
                    // Activamos las 20 hermosas estrellas fugaces CSS con transiciones fluidas de opacidad ☄️
                    shootingStarsSky.classList.add('active');
                    
                    // Espera exactamente 2 minutos (120,000 ms) observando las estrellas antes de reiniciar
                    setTimeout(() => {
                        // Apagamos las estrellas fugaces justo antes de reanudar el poema
                        shootingStarsSky.classList.remove('active');
                        showNextPhrase();
                    }, 120000);
                } else {
                    storyText.innerHTML = PHRASES[currentPhraseIndex];
                    storyText.style.opacity = '1';
                    currentPhraseIndex++;
                    
                    setTimeout(showNextPhrase, 7500);
                }
            }, 1500); 
        }

        setTimeout(showNextPhrase, 1000);

        // ====================================================================
        // 4.5. SISTEMA DE REPRODUCCIÓN DE AUDIO SEGURO
        // ====================================================================
        const bgMusic = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        const btnStart = document.getElementById('btn-start');
        const startScreen = document.getElementById('start-screen');
        let musicStarted = false;

        bgMusic.volume = 1.0;

        btnStart.addEventListener('click', () => {
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 600);

            // Iniciamos la melodía sin llamar a .load() para mantener los permisos activos
            bgMusic.play().then(() => {
                musicStarted = true;
                musicToggle.innerHTML = "🔊";
            }).catch(err => {
                console.warn("Audio retenido temporalmente por las políticas del navegador:", err);
            });
        });

        window.toggleMusic = function() {
            if (!musicStarted) {
                musicStarted = true;
            }
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicToggle.innerHTML = "🔊";
                }).catch(err => {
                    console.error("Error al reanudar la música:", err);
                });
            } else {
                bgMusic.pause();
                musicToggle.innerHTML = "🔇";
            }
        }

        function startMusicFallback() {
            if (!musicStarted && bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicToggle.innerHTML = "🔊";
                }).catch(() => {});
            }
        }

        // ====================================================================
        // 5. INTERACTIVIDAD Y EFECTO DE CORAZONES FLUTUANTES
        // ====================================================================
        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX - window.innerWidth / 2) * 0.08;
            targetY = (e.clientY - window.innerHeight / 2) * 0.08;
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                targetX = (e.touches[0].clientX - window.innerWidth / 2) * 0.08;
                targetY = (e.touches[0].clientY - window.innerHeight / 2) * 0.08;
            }
        });

        const overlay = document.getElementById('space-overlay');
        overlay.addEventListener('click', (e) => {
            createHeart(e.clientX, e.clientY);
            startMusicFallback();
        });

        overlay.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches[0]) {
                createHeart(e.touches[0].clientX, e.touches[0].clientY);
            }
            startMusicFallback();
        });

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = `${x}px`;
            heart.style.top = `${y}px`;
            
            const duration = 1.6 + Math.random() * 0.8;
            const size = 1 + Math.random() * 1.5;
            
            heart.style.animationDuration = `${duration}s`;
            heart.style.transform = `scale(${size})`;
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // ====================================================================
        // 6. LOOP DE ANIMACIÓN 3D DEL UNIVERSO
        // ====================================================================
        const animate = function () {
            requestAnimationFrame(animate);

            // Rota de manera continua el fondo galáctico
            galaxyMesh.rotation.y += 0.0003;
            galaxyMesh.rotation.x += 0.0001;
            
            // Rotación lenta sobre el eje de la Luna
            if (moonMesh) {
                moonMesh.rotation.y += 0.0006; 
            }

            // Suavizado dinámico del paralaje (Lerp)
            currentX += (targetX - currentX) * 0.04;
            currentY += (targetY - currentY) * 0.04;

            camera.position.x = currentX;
            camera.position.y = -currentY; 
            camera.lookAt(scene.position);

            renderer.render(scene, camera); 
        };

        animate();

        // ====================================================================
        // 7. RESPONSIVIDAD DE PANTALLA
        // ====================================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
    </script>
</body>
</html>
